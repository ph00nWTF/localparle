# v2 training config — read by scripts/train_v2.py
# All required keys validated at load time by src/french_tutor/train_v2.py:_validate_train_cfg

data:
  processed_dir: /kuhpc/scratch/deng/e394n539/french-data/processed

model:
  backbone: facebook/wav2vec2-xls-r-300m
  attention_dropout: 0.1
  hidden_dropout: 0.1
  feat_proj_dropout: 0.0
  mask_time_prob: 0.05
  layerdrop: 0.1
  ctc_loss_reduction: mean
  freeze_feature_extractor: true   # internally calls freeze_feature_encoder()

training:
  output_dir: /kuhpc/scratch/deng/e394n539/french-data/checkpoints/wav2vec2-fr-xlsr-v2
  num_train_epochs: 10
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: false  # MUST be false: DDP + frozen params + checkpointing = "marked ready twice"
  eval_strategy: "no"
  save_strategy: steps
  save_steps: 1000
  save_total_limit: 3
  logging_steps: 50
  load_best_model_at_end: false
  seed: 42
  report_to: tensorboard

sampling:
  train_frac: 1.0
  max_steps: null

export:
  final_dir: /kuhpc/scratch/deng/e394n539/french-data/models/final-v2
