# DDP smoke test for v2 training pipeline
# 1% data, 50 steps, multi-GPU via torchrun

data:
  processed_dir: /kuhpc/scratch/deng/e394n539/french-data/processed

model:
  backbone: facebook/wav2vec2-xls-r-300m
  attention_dropout: 0.1
  hidden_dropout: 0.1
  feat_proj_dropout: 0.0
  mask_time_prob: 0.05
  layerdrop: 0.1
  ctc_loss_reduction: mean
  freeze_feature_extractor: true

training:
  output_dir: /kuhpc/scratch/deng/e394n539/french-data/checkpoints/test-v2
  num_train_epochs: 1
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 1
  learning_rate: 3.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: false
  eval_strategy: "no"
  save_strategy: "no"
  logging_steps: 10
  load_best_model_at_end: false
  seed: 42
  report_to: tensorboard

sampling:
  train_frac: 0.01
  max_steps: 50

export:
  final_dir: /kuhpc/scratch/deng/e394n539/french-data/models/test-v2
