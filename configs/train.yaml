# Training config — read by scripts/train.py and src/french_tutor/train.py
data:
  processed_dir: /kuhpc/scratch/deng/e394n539/french-data/processed

model:
  backbone: facebook/wav2vec2-xls-r-300m
  attention_dropout: 0.1
  hidden_dropout: 0.1
  feat_proj_dropout: 0.0
  mask_time_prob: 0.05
  layerdrop: 0.1
  ctc_loss_reduction: mean
  freeze_feature_extractor: true   # standard for wav2vec2 fine-tuning

training:
  output_dir: /kuhpc/scratch/deng/e394n539/french-data/checkpoints/wav2vec2-fr-xlsr
  num_train_epochs: 10
  per_device_train_batch_size: 8
  per_device_eval_batch_size: 8
  gradient_accumulation_steps: 4   # effective batch 32
  learning_rate: 3.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.01
  fp16: true
  gradient_checkpointing: false    # DDP + checkpointing + frozen params = "marked ready twice" error; 4×A40 has enough VRAM
  # Each epoch is ~13h on A100 sixhour; epoch-based save would never fire within the 6h
  # wall limit. Use step-based save every 1000 steps (~41 min) so each job leaves
  # checkpoints. eval_strategy must match save_strategy when load_best_model_at_end=true,
  # so eval is also disabled; run evaluate.py manually after training finishes.
  eval_strategy: "no"
  save_strategy: steps
  save_steps: 1000
  save_total_limit: 3
  logging_steps: 50
  load_best_model_at_end: false
  seed: 42
  report_to: tensorboard

sampling:
  train_frac: 1.0
  max_steps: null

# Where to copy the best-by-dev-WER export after training finishes.
export:
  final_dir: /kuhpc/scratch/deng/e394n539/french-data/models/final
